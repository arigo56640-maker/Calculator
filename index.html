<style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<div class="calculator-scale">
<!-- Top App Bar -->

<div class="flex items-center gap-4">
<button class="text-slate-400 hover:bg-slate-800 p-2 rounded-full duration-150 ease-in-out">

</button>
<h1 class="font-['Inter'] font-bold text-xl tracking-tight text-slate-100">מחשבון</h1>
</div>
<button class="text-slate-400 hover:bg-slate-800 p-2 rounded-full duration-150 ease-in-out">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col">
<!-- Display Area: The "Void" -->
<section class="bg-inverse-surface p-8 flex flex-col justify-end items-end min-h-[309px] relative overflow-hidden">
<!-- Background Aesthetic Element -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
<!-- Secondary History/Calculation String -->
<div class="text-primary-fixed-dim text-lg font-medium mb-2 tracking-wide font-label opacity-80" dir="ltr" id="calc-expression">
            0
        </div>
<!-- Primary Result -->
<div class="text-inverse-on-surface text-6xl md:text-7xl font-extrabold tracking-tighter leading-none break-all" dir="ltr" id="calc-display">
            0
        </div>
<!-- Cursor/Active State Indicator (Subtle) -->
<div class="mt-4 h-1 w-12 bg-primary-fixed-dim rounded-full"></div>
</section>
<!-- Keypad: The "Monolith" Restructured -->
<section class="flex-1 bg-surface p-6 md:p-12">
<div class="flex flex-row gap-4 h-full max-w-lg mx-auto" dir="ltr">
<!-- Main Grid: Numbers & Functions (3 columns) -->
<div class="grid grid-cols-3 gap-4 flex-1">
<!-- Row 1 -->
<button class="aspect-square flex items-center justify-center bg-error-container text-on-error-container text-2xl font-bold rounded-xl hover:opacity-90 active:scale-95 transition-all" data-action="clear">

                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-secondary-container text-2xl font-bold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-action="backspace">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-secondary-container text-2xl font-bold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-action="percent">
                    %
                </button>
<!-- Numbers Row 7-9 -->
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="7">
                    7
                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="8">
                    8
                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="9">
                    9
                </button>
<!-- Numbers Row 4-6 -->
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="4">
                    4
                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="5">
                    5
                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="6">
                    6
                </button>
<!-- Numbers Row 1-3 -->
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="1">
                    1
                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="2">

                </button>
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="3">
                    3
                </button>
<!-- Last Row -->
<button class="aspect-square flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value=".">
                    .
                </button>
<button class="col-span-2 aspect-auto flex items-center justify-center bg-secondary-container text-on-surface text-3xl font-semibold rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all" data-value="0">
                    0
                </button>
</div>
<!-- Dedicated Operator Column (Right side, vertical) -->
<div class="flex flex-col gap-4 w-1/4">
<button class="flex-1 flex items-center justify-center bg-primary text-3xl font-bold rounded-xl hover:bg-primary-container active:scale-95 transition-all" data-op="/">
                    ÷
                </button>
<button class="flex-1 flex items-center justify-center bg-primary text-3xl font-bold rounded-xl hover:bg-primary-container active:scale-95 transition-all" data-op="*">
                    ×
                </button>
<button class="flex-1 flex items-center justify-center bg-primary text-3xl font-bold rounded-xl hover:bg-primary-container active:scale-95 transition-all" data-op="-">
                    -
                </button>
<button class="flex-1 flex items-center justify-center bg-primary text-3xl font-bold rounded-xl hover:bg-primary-container active:scale-95 transition-all" data-op="+">
                    +
                </button>
<button class="flex-1 flex items-center justify-center text-3xl font-black rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20 bg-error-container text-on-error-container" data-action="equals">
                    =
                </button>
</div>
</div>
</section>
</main>
<!-- Side Navigation Drawer -->
<aside class="fixed right-0 top-0 h-full w-80 bg-slate-50 z-50 flex flex-col p-4 text-right shadow-2xl transition-transform duration-300 translate-x-full">
<div class="flex flex-row-reverse justify-between items-center mb-10 px-4">
<h2 class="text-2xl font-black text-slate-900">מחשבון פרימיום</h2>
<button class="p-2 rounded-full hover:bg-slate-100">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<nav class="flex flex-col gap-2">
<a class="bg-blue-50 text-blue-700 rounded-xl px-4 py-3 flex flex-row-reverse items-center gap-4 font-['Inter'] text-sm font-medium tracking-wide" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span>היסטוריה</span>
</a>
<a class="text-slate-600 px-4 py-3 flex flex-row-reverse items-center gap-4 font-['Inter'] text-sm font-medium tracking-wide hover:bg-slate-100" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span>הגדרות</span>
</a>
<a class="text-slate-600 px-4 py-3 flex flex-row-reverse items-center gap-4 font-['Inter'] text-sm font-medium tracking-wide hover:bg-slate-100" href="#">
<span class="material-symbols-outlined" data-icon="calculate">calculate</span>
<span>מצב מדעי</span>
</a>
</nav>
<div class="mt-auto p-4 bg-surface-container-low rounded-xl">
<p class="text-xs text-on-surface-variant leading-relaxed">
            מחשבון בעיצוב נקי המותאם לשימוש יומיומי עם דגש על נגישות וחווית משתמש מודרנית.
        </p>
</div>
</aside>
<!-- Navigation Overlay -->
<div class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden"></div>
</div>
<script>
  (() => {
    const expressionEl = document.getElementById("calc-expression");
    const displayEl = document.getElementById("calc-display");

    let current = "0";
    let previous = null;
    let operator = null;
    let overwriteCurrent = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, duration = 0.08, vol = 0.15) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    };
    const sound = {
      digit: () => playTone(600, 0.06),
      operator: () => playTone(800, 0.08),
      equals: () => playTone(1000, 0.12, 0.2),
      clear: () => playTone(300, 0.15, 0.2),
      backspace: () => playTone(400, 0.06),
      error: () => { playTone(200, 0.2, 0.2); setTimeout(() => playTone(150, 0.25, 0.2), 150); },
    };

    const formatNumber = (num) => {
      if (!Number.isFinite(num)) return "Error";
      return new Intl.NumberFormat("en-US", { maximumFractionDigits: 10 }).format(num);
    };

    const parseCurrent = () => Number(current);

    const updateUI = () => {
      displayEl.textContent = current === "Error" ? "Error" : formatNumber(parseCurrent());
      if (previous !== null && operator) {
        expressionEl.textContent = `${formatNumber(previous)} ${operator}`;
      } else {
        expressionEl.textContent = "0";
      }
    };

    const clearAll = () => {
      current = "0";
      previous = null;
      operator = null;
      overwriteCurrent = false;
      updateUI();
    };

    const appendDigit = (value) => {
      if (current === "Error") clearAll();
      if (overwriteCurrent) {
        current = value === "." ? "0." : value;
        overwriteCurrent = false;
        updateUI();
        return;
      }
      if (value === "." && current.includes(".")) return;
      if (current === "0" && value !== ".") {
        current = value;
      } else {
        current += value;
      }
      updateUI();
    };

    const applyPercent = () => {
      if (current === "Error") return;
      current = String(parseCurrent() / 100);
      updateUI();
    };

    const backspace = () => {
      if (current === "Error") {
        clearAll();
        return;
      }
      if (overwriteCurrent) return;
      current = current.length > 1 ? current.slice(0, -1) : "0";
      if (current === "-" || current === "") current = "0";
      updateUI();
    };

    const calculate = () => {
      if (previous === null || !operator) return;
      const a = previous;
      const b = parseCurrent();
      let result;
      switch (operator) {
        case "+": result = a + b; break;
        case "-": result = a - b; break;
        case "*": result = a * b; break;
        case "/": result = b === 0 ? NaN : a / b; break;
        default: return;
      }
      current = Number.isFinite(result) ? String(result) : "Error";
      previous = null;
      operator = null;
      overwriteCurrent = true;
      updateUI();
    };

    const setOperator = (nextOp) => {
      if (current === "Error") return;
      if (previous !== null && operator && !overwriteCurrent) {
        calculate();
      }
      if (current === "Error") return;
      previous = parseCurrent();
      operator = nextOp;
      overwriteCurrent = true;
      updateUI();
    };

    document.querySelectorAll("button[data-value]").forEach((btn) => {
      btn.addEventListener("click", () => { sound.digit(); appendDigit(btn.dataset.value); });
    });

    document.querySelectorAll("button[data-op]").forEach((btn) => {
      btn.addEventListener("click", () => { sound.operator(); setOperator(btn.dataset.op); });
    });

    document.querySelectorAll("button[data-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;
        if (action === "clear") { sound.clear(); clearAll(); }
        if (action === "backspace") { sound.backspace(); backspace(); }
        if (action === "percent") { sound.operator(); applyPercent(); }
        if (action === "equals") {
          const hadError = current === "Error";
          calculate();
          if (current === "Error" && !hadError) sound.error(); else sound.equals();
        }
      });
    });

    updateUI();
  })();
</script>
</body></html>
